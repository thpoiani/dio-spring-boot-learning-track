services:
  database:
    image: postgres:18.3
    environment:
      POSTGRES_DB: catalog
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5433:5432"
    volumes:
      - data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d ticketing"]
      interval: 5s
      timeout: 5s
      retries: 3

volumes:
  data:
